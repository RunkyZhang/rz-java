<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AI 智能对话</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-layout {
            width: 95%;
            max-width: 1400px;
            height: 90vh;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            background: white;
        }

        .sidebar {
            width: 15%;
            min-width: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 20px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .sidebar h1 {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.4;
        }

        .chat-container {
            width: 85%;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 85%;
            padding: 16px 22px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.8;
            font-size: 16px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.ai .message-content h1,
        .message.ai .message-content h2,
        .message.ai .message-content h3,
        .message.ai .message-content h4,
        .message.ai .message-content h5,
        .message.ai .message-content h6 {
            margin: 10px 0 5px 0;
            font-weight: 600;
        }

        .message.ai .message-content h1 { font-size: 1.8em; }
        .message.ai .message-content h2 { font-size: 1.6em; }
        .message.ai .message-content h3 { font-size: 1.4em; }
        .message.ai .message-content h4 { font-size: 1.2em; }
        .message.ai .message-content h5 { font-size: 1.1em; }
        .message.ai .message-content h6 { font-size: 1em; }

        .message.ai .message-content p {
            margin: 10px 0;
            font-size: 16px;
        }

        .message.ai .message-content code {
            background: #f4f4f4;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .message.ai .message-content pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message.ai .message-content pre code {
            background: none;
            padding: 0;
            font-size: 14px;
        }

        .message.ai .message-content ul,
        .message.ai .message-content ol {
            margin: 10px 0;
            padding-left: 25px;
        }

        .message.ai .message-content li {
            margin: 6px 0;
            font-size: 16px;
        }

        .message.ai .message-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 15px;
            margin: 10px 0;
            color: #666;
            font-size: 15px;
        }

        .message.ai .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
            font-size: 15px;
        }

        .message.ai .message-content th,
        .message.ai .message-content td {
            border: 1px solid #ddd;
            padding: 10px 12px;
            text-align: left;
        }

        .message.ai .message-content th {
            background: #f4f4f4;
            font-weight: 600;
        }

        .message.ai .message-content a {
            color: #667eea;
            text-decoration: none;
        }

        .message.ai .message-content a:hover {
            text-decoration: underline;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .welcome-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .welcome-message h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #667eea;
        }

        .welcome-message p {
            font-size: 16px;
        }

        @media (max-width: 900px) {
            .app-layout {
                flex-direction: column;
            }

            .sidebar,
            .chat-container {
                width: 100%;
            }

            .sidebar {
                min-width: unset;
            }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <h1>🤖 AI 智能助手</h1>
    </aside>

    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>欢迎使用 AI 对话</h2>
                <p>开始与我聊天吧！我可以回答你的各种问题。</p>
            </div>
        </div>

        <div class="chat-input-container">
            <input
                    type="text"
                    class="chat-input"
                    id="chatInput"
                    placeholder="输入你的问题..."
                    onkeypress="handleKeyPress(event)"
            >
            <button class="send-button" id="sendButton" onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendButton = document.getElementById('sendButton');

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function addMessage(content, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;

        const messageContent = document.createElement('div');
        messageContent.className = 'message-content';

        if (isUser) {
            messageContent.textContent = content;
        } else {
            messageContent.innerHTML = marked.parse(content);
        }

        messageDiv.appendChild(messageContent);
        chatMessages.appendChild(messageDiv);

        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showLoading() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai';
        loadingDiv.id = 'loadingMessage';

        const loadingContent = document.createElement('div');
        loadingContent.className = 'message-content';
        loadingContent.innerHTML = '<div class="loading"></div>';

        loadingDiv.appendChild(loadingContent);
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideLoading() {
        const loadingMessage = document.getElementById('loadingMessage');
        if (loadingMessage) {
            loadingMessage.remove();
        }
    }

    async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;

        addMessage(message, true);
        chatInput.value = '';
        sendButton.disabled = true;
        showLoading();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: message
                })
            });
            const data = await response.text();

            hideLoading();
            addMessage(data, false);
        } catch (error) {
            hideLoading();
            addMessage('抱歉，发生了错误，请稍后重试。', false);
            console.error('Error:', error);
        } finally {
            sendButton.disabled = false;
            chatInput.focus();
        }
    }

    chatInput.focus();
</script>
</body>
</html>
